services:
  server:
    container_name: personal-website
    build:
      context: .
      dockerfile: ./Dockerfile
    image: personal-website:prod
    restart: unless-stopped
    ports:
      # Host-specific bind IP comes from an untracked .env (WEB_BIND_IP).
      # Defaults to loopback so a missing .env fails CLOSED (unreachable), never open.
      # Set WEB_BIND_IP to the LAN interface (e.g. 192.168.0.118) so the reverse
      # proxy on another host can reach it; a reverse proxy still fronts TLS.
      - "${WEB_BIND_IP:-127.0.0.1}:3000:3000"
    read_only: true                # immutable root FS — no dropping webshells
    tmpfs:
      - /tmp
      - /app/.next/cache           # next may write cache here; keep it ephemeral
    cap_drop: [ ALL ]
    security_opt:
      - no-new-privileges:true
    user: "1000:1000"              # explicit non-root (matches USER bun in the image)
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 256
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # NOTE: no source bind mount. Code is COPYed into the image and reviewed via git.
